<!DOCTYPE html>
<html lang="ru" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Личный Сейф</title>
    <style>
        :root { --bg: #121214; --card-bg: #1a1a1e; --text: #e1e1e6; --primary: #00b0ff; --border: #29292e; --accent: #00e676; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .container { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        h3 { margin-top: 0; margin-bottom: 20px; font-weight: 500; }
        input[type="password"] { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background: var(--primary); border: none; color: #000; font-weight: 600; border-radius: 6px; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .hidden { display: none; }
        textarea { width: 100%; height: 200px; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; box-sizing: border-box; border-radius: 6px; font-family: monospace; font-size: 14px; resize: none; margin-bottom: 15px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-secondary { background: #29292e; color: #fff; }
        .btn-accent { background: var(--accent); color: #000; }
        .output-box { background: #000; padding: 10px; border-radius: 6px; font-size: 12px; color: #00e676; overflow-x: auto; white-space: pre-wrap; word-break: break-all; border: 1px dashed var(--border); max-height: 150px; }
    </style>
</head>
<body>

    <div class="container" id="auth-box">
        <h3>Введите ключ доступа</h3>
        <input type="password" id="password-input" placeholder="Введите ваш пароль" onkeydown="if(event.key==='Enter') handleAuth()">
        <button onclick="handleAuth()">Открыть архив</button>
    </div>

    <div class="container hidden" id="content-box">
        <h3>Ваша информация (можно редактировать):</h3>
        <textarea id="secret-text" placeholder="Вставьте сюда ваши ссылки..."></textarea>
        
        <div class="btn-group">
            <button onclick="copyData()">Скопировать текст</button>
            <button class="btn-accent" onclick="encryptAndGenerate()">Сохранить изменения</button>
            <button class="btn-secondary" onclick="lockPage()">Закрыть</button>
        </div>

        <div id="output-container" class="hidden">
            <p style="font-size: 13px; color: #aaa; margin-bottom: 5px;">Скопируйте эту строку целиком и замените ей значение ENCRYPTED_DATA в коде на GitHub:</p>
            <div class="output-box" id="new-code-output"></div>
        </div>
    </div>

    <script>
        // Изначально здесь пусто. Сюда встанет созданный вами личный код.
        let ENCRYPTED_DATA = "V28UgaAsFcwZHMAJcmy+tCweWOAOxIa/S0U8U1+EFcqkyUmOQZpx9tWBQS1kBDvrAvwpQmsTprDM3/zpsm3o7Y8xNGbrrlvr1fNNTYFTzweQfqIHY+2YBkJ5juRX5oOMXRhc2CrJoNwAt9I/0ObohZ6oxcchV/xzjUF/PRrpZCOVt8PAJSJP13r0A/wiVSj1vx5VpvxB1ibimVm12ngtfDv0VM2dfRoz2R88hbXvSrdwOzLUXoF9qbKfHAZCoVD8Wr6OsYfUnNB8UQ8Jh9fNSSIKB4RaLVDon2SGwpPGIMnOIzt36poT3hcHSNzhyQslHRUmICecdgF/DqDUSor/Ngd6/FccbVpprIYEHEmi3ggVnbrvwubOg5DX5A7iyQQ2gjmvvivJD5djMDOFPFhzl1LRN47VQvUG19DgBSEuG5CgbAz5CFoiyf37cVjNhOb7xKDjG20rIPUPAt/MkqQeStGAYtNVAx4zKMquOy2Vxg7B8yIfZXETqzuGZ5AGM0J+jGpL32plnOgZgyM8c0glR/GTTgZ1OcEMZCBKaEbK9GpDjsLMfjlt8DslSgycUhi2PtbAJEhZQll58WXRPHfW0RogRSFjH22xG4KyfTuqOOBsW2Qz89+0GCnWH0YXKCR33360f9+/dielRsDbAT2qdgNLmYGdvTg8xL6MSERvE0XvJ36BBXrqDEXQmDr5+Lzd606KQ9ODvbFH8YYnF96aKIuLIeYhd2SLiAtqTyY7dX4HAOqHxJCUQ//CkbMgMgXI8H7693Fn+dbRczIQ9jLNyg7rieU86e2KFr19Flw9RLXVXVqhmmYyGeUJW/jGlpDagslSGsTFkbAuGmwH8fCKPnhC71FbRLiIeify8IwaBeumz1lbpPYvcszVVCt74w==";; 

        let currentPassword = "";

        // Вспомогательные функции для работы со встроенным крипто-API браузера
        async function getKey(password, salt) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]);
            return crypto.subtle.deriveKey({ name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
        }

        async function handleAuth() {
            currentPassword = document.getElementById('password-input').value;
            if(!currentPassword) { alert('Введите пароль!'); return; }

            if (ENCRYPTED_DATA === "" || ENCRYPTED_DATA.trim().length < 10) {
                document.getElementById('secret-text').value = "Автономный сейф активирован!\n\n1. Сотрите этот текст.\n2. Напишите ваши ссылки или личные заметки.\n3. Нажмите кнопку 'Сохранить изменения'.";
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('content-box').classList.remove('hidden');
                return;
            }

            try {
                const raw = atob(ENCRYPTED_DATA.trim());
                const rawBytes = new Uint8Array(raw.length);
                for (let i = 0; i < raw.length; i++) rawBytes[i] = raw.charCodeAt(i);

                const salt = rawBytes.slice(0, 16);
                const iv = rawBytes.slice(16, 28);
                const data = rawBytes.slice(28);

                const key = await getKey(currentPassword, salt);
                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data);
                
                document.getElementById('secret-text').value = new TextDecoder().decode(decrypted);
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('content-box').classList.remove('hidden');
            } catch (e) {
                alert('Неверный пароль или данные искажены!');
            }
        }

        function copyData() {
            const textarea = document.getElementById('secret-text');
            textarea.select();
            navigator.clipboard.writeText(textarea.value).then(() => alert('Текст успешно скопирован!'));
        }

        async function encryptAndGenerate() {
            const freshText = document.getElementById('secret-text').value;
            if (!freshText.trim()) { alert('Текст не может быть пустым!'); return; }
            
            if (!currentPassword) {
                currentPassword = prompt("Подтвердите ваш текущий пароль для шифрования:");
                if (!currentPassword) return;
            }

            try {
                const salt = crypto.getRandomValues(new Uint8Array(16));
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const key = await getKey(currentPassword, salt);
                const enc = new TextEncoder();
                const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, enc.encode(freshText));

                const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
                combined.set(salt, 0);
                combined.set(iv, salt.length);
                combined.set(new Uint8Array(encrypted), salt.length + iv.length);

                let binary = "";
                for (let i = 0; i < combined.length; i++) binary += String.fromCharCode(combined[i]);
                const base64 = btoa(binary);
                
                document.getElementById('new-code-output').innerText = 'let ENCRYPTED_DATA = "' + base64 + '";';
                document.getElementById('output-container').classList.remove('hidden');
                
                alert('Успешно зашифровано! Зелёная строка сгенерирована в самом низу страницы.');
            } catch (err) {
                alert('Ошибка при шифровании: ' + err.message);
            }
        }

        function lockPage() {
            document.getElementById('password-input').value = '';
            document.getElementById('secret-text').value = '';
            document.getElementById('output-container').classList.add('hidden');
            document.getElementById('content-box').classList.add('hidden');
            document.getElementById('auth-box').classList.remove('hidden');
            currentPassword = "";
        }
    </script>
</body>
</html>
